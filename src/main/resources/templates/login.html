<body style="height: 100vh">

    <div class="d-flex justify-content-center align-items-center" style="height: 80%">
        <div class="card shadow border-0" style="width: 35rem; border-radius: 40px;">
            
            <div class="card-header bg-info text-white text-center" style="border-radius: 40px 40px 0 0;">
                <h2 class="mb-0">LOGAR</h2>
            </div>
            
            <div class="card-body p-4">
                <form th:action="@{/logar}" th:object="${credenciais}" method="post">                        
                    <div class="row justify-content-center">
                        <label class="col-2" style="padding-left: 20px;">E-mail</label>
                    </div>
                    <div class="row justify-content-center">
                        <input class="form-control rounded-pill" style="max-width: 300px;" type="email" th:field="*{email}" />
                    </div>
                    <br/>
                    <div class="row justify-content-center">
                        <label class="col-2" style="padding-left: 20px;">Senha</label>
                    </div>
                    <div class="row justify-content-center">
                        <input class="form-control rounded-pill" style="max-width: 300px;" type="password" th:field="*{senha}"/>
                    </div>
                    <br/>
                    <div class="row justify-content-center">
                        <button type="submit" class="btn btn-info text-white col-3">Entrar</button>
                    </div>
                    <div class="text-center mt-3">
                        <a class="text-decoration-none" th:href="@{/registrar}">Não tem uma conta? Cadastrar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
