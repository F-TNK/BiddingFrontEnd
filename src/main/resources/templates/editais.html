<html>
    <head>
        <title>Editais</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
        
    </head>
    
    <main class="container py-5">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

                <div>
                    <h1 class="fw-bold mb-0">
                        Editais
                    </h1>
                </div>
                <div>
                    <a th:if="${role == 'COMPRADOR'}"
                       th:href="@{/editais/novo}"
                       class="btn btn-primary">

                        + Novo Edital
                    </a>
                    <!-- LOGOUT -->
                    <a th:href="@{/logout}"
                       class="btn btn-danger">

                        Sair
                    </a>

                </div>
            </div>
    
<body class="bg-light height: 100vh">
<div class="container mt-5">
    
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0 align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th scope="col" class="px-3">ID</th>
                        <th scope="col">Título</th>
                        <th scope="col">Descrição</th>
                        <th scope="col">Data de Fechamento</th>
                        <th scope="col">Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="edital : ${editais}">
                        <td class="px-3 fw-bold" th:text="${edital.id}"></td>
                        <td th:text="${edital.titulo}"></td>
                        <td class="text-muted" th:text="${edital.descricao}"></td>
                        <td th:text="${edital.dataFechamentoFormatada}"></td>
                        <td>
                            <span class="badge bg-primary" th:text="${edital.status}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(editais)}">
                        <td colspan="5" class="text-center py-4 text-muted">Nenhum edital encontrado.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
