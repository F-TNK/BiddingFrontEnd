<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Cadastrar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">BIDDING</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/login">Entrar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/registrar">Cadastro</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" href="/editais">Editais</a>
                    </li>
                </ul>
                
            </div>
        </div>
    </nav>
</head>

<body style="height: 100vh">
    <br>
    <div class="d-flex justify-content-center align-items-center" style="height: 80%">
        <div class="card shadow border-0" style="width: 35rem; border-radius: 40px;">
            
            <div class="card-header bg-info text-white text-center" style="border-radius: 40px 40px 0 0;">
                <h2 class="mb-0">CADASTRO</h2>
            </div>
            
            <div class="card-body p-4">
                <form th:action="@{/registrar}" th:object="${user}" method="post">
                    <div class="row justify-content-center">
                        <label class="col-2" style="padding-left: 20px;">Nome</label>
                    </div>
                    <div class="row justify-content-center">
                        <input class="form-control rounded-pill" style="max-width: 300px;" type="text" th:field="*{nome}" placeholder="Seu nome"/>
                    </div>
                    <br/>
                    <div class="row justify-content-center">
                        <label class="col-2" style="padding-left: 22px;">Email</label>
                    </div>
                    <div class="row justify-content-center">
                        <input class="form-control rounded-pill" style="max-width: 300px;" type="email" th:field="*{email}" placeholder="seu@email.com"/>
                    </div>
                    <br/>
                    <div class="row justify-content-center">
                        <label class="col-2" style="padding-left: 20px;">Senha</label>
                    </div>
                    <div class="row justify-content-center">
                        <input class="form-control rounded-pill" style="max-width: 300px;" type="password" th:field="*{senha}"/>
                    </div>
                    <br/>
                    <div class="row justify-content-center">
                        <button type="submit" class="btn btn-info text-white col-3">Cadastrar</button>
                    </div>
                    <div class="text-center mt-3">
                        <a class="text-decoration-none" th:href="@{/login}">Já tem uma conta? Logar</a>
                    </div>
            </div>
        </div>
    </div>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
