<body>
<h2 style="text-align: center;">LOGAR</h2>
<br>
<form th:action="@{/registrar}" th:object="${credenciais}" method="post">
    <div class="card" style="width: 18rem;">
        <div class="card-body">
            <label class="col-2">E-mail: </label>
            <input class="col-6" type="email" th:field="*{email}"/>
            <br/>
            <label class="col-2">Senha: </label>
            </div>
            <input class="col-6" type="password" th:field="*{senha}"/>
            </div>
            <br/>
            <button type="submit" class="btn btn-success col-3">Logar</button>
            </div>
            </div>
        </div>
    </div>
</form>
